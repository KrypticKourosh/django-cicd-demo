name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          pytho-version: "3.12.3"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest.django

      - name: Run tests
        run: pytest